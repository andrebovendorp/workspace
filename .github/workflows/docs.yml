name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install Latest Stable Dependencies
        run: |
          # We pin to <2.0 to avoid the breaking MkDocs 2.0 rewrite
          pip install "mkdocs>=1.6.1,<2.0" "mkdocs-material>=9.7.6,<10.0"
          
          # Optional: Install requirements if you have specific plugins
          if [ -f docs/requirements.txt ]; then
            pip install -r docs/requirements.txt
          fi

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build MkDocs
        run: |
          # strict mode ensures links aren't broken
          mkdocs build --clean --strict
        env:
          # Disables the 2.0 incompatibility warning banner in logs
          NO_MKDOCS_2_WARNING: "true"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5