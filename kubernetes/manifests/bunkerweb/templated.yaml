# Source: bunkerweb/templates/external-secret.yaml
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bunkerweb-credentials
  namespace: bunkerweb
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: bunkerweb-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        database-uri: "mariadb.nullservers.com"
        admin-username: "{{ .username }}"
        admin-password: "{{ .password }}"
        mariadb-user: "{{ .dbUsername }}"
        mariadb-password: "{{ .dbPassword }}"
        api-token: "{{ .token }}"
  data:
    - secretKey: username
      remoteRef:
        key: bunkerweb-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: bunkerweb-credentials
        property: password
    - secretKey: dbPassword
      remoteRef:
        key: bunkerweb-credentials
        property: dbPassword
    - secretKey: dbUsername
      remoteRef:
        key: bunkerweb-credentials
        property: dbUsername
    - secretKey: token
      remoteRef:
        key: bunkerweb-credentials
        property: token
